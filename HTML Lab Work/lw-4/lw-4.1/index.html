<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Food Menu</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Remix Icon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="menu">

    <h1><i class="ri-restaurant-fill"></i> FOOD MENU</h1>

    <div class="section">
        <h2><i class="ri-cup-fill"></i> Breakfast</h2>

        <div class="item">
            <span>🥞 Pancakes</span>
            <span>₹120</span>
        </div>

        <div class="item">
            <span>🥪 Sandwich</span>
            <span>₹80</span>
        </div>

        <div class="item">
            <span>☕ Coffee</span>
            <span>₹60</span>
        </div>
    </div>


    <div class="section">
        <h2><i class="ri-restaurant-fill"></i> Lunch</h2>

        <div class="item">
            <span>🍛 Veg Thali</span>
            <span>₹180</span>
        </div>

        <div class="item">
            <span>🍕 Pizza</span>
            <span>₹250</span>
        </div>

        <div class="item">
            <span>🍔 Burger</span>
            <span>₹150</span>
        </div>
    </div>


    <div class="section">
        <h2><i class="ri-moon-fill"></i> Dinner</h2>

        <div class="item">
            <span>🍝 Pasta</span>
            <span>₹220</span>
        </div>

        <div class="item">
            <span>🍜 Noodles</span>
            <span>₹170</span>
        </div>

        <div class="item">
            <span>🥗 Salad</span>
            <span>₹100</span>
        </div>
    </div>

    <p class="footer">
        Enjoy your meal ❤️
    </p>

</div>

</body>
</html
